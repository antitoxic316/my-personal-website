{% extends 'base.html' %}

{% load static %}

{% block content %}

  <div 
    id="rendererDiv" 
    class="flex-grow min-h-200 relative"
    data-laptop-obj-url="{% static 'resources/models/laptop/laptop.glb' %}"
    data-projects-url="{% url 'projects:index' %}"
    data-quests-url="{% url 'quests:index' %}"
    data-stuff-url="{% url 'stuff:cat' %}"
  >
    <canvas id="3dcanvas"></canvas>
    <div id="canvasHintDiv" class="absolute inset-0 z-50 pointer-events-none animate-pulse flex flex-col items-center justify-center">
      <p class="text-center text-2xl pt-6 pb-2">You can rotate the laptop with your mouse/touchscreen!</p>
      <p class="text-center text-xl">The text on laptop is clickable.</p>
      <img
              src="{% static 'images/rotation.png' %}",
              alt="rotation.png",
              loading="lazy",
              class="max-w-screen h-full object-cover opacity-75"
            >
    </div>
  </div>
  <script src="{% static 'js/cookies.js' %}"></script>
  <script type="module" src="{% static '/js/dist/main.js' %}"></script>
  <script>
    canvDiv = document.getElementById("rendererDiv");
    if(canvDiv){
      const csName = getCookie("colorScheme_");
      const hexColor = CSDict[csName].canvasBgHexColor;
      canvDiv.dataset.mainbgColor = hexColor;
    }
  </script>
  <script>
    if(getCookie("canvasHintSeen") === "true"){
      document.getElementById("canvasHintDiv").remove();
    }

    document.getElementById("rendererDiv").addEventListener("mousedown", () => {
      if(getCookie("canvasHintSeen") === "true") return;
      setCookie("canvasHintSeen", "true", 0.5);

      document.getElementById("canvasHintDiv").remove();
    });


    document.getElementById("rendererDiv").addEventListener("touchstart", () => {
      if(getCookie("canvasHintSeen") === "true") return;
      setCookie("canvasHintSeen", "true", 0.5);

      document.getElementById("canvasHintDiv").remove();
    });
  </script>
{% endblock %}
